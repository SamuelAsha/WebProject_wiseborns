<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" >
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>longin tab</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <style>
            body {
                background-image: url(Background2.jpg);
                background-repeat: no-repeat;
                background-size: cover;
                height: 100vh;
                align-items: center;
                display: flex;
                justify-content: center;
                margin: 0;
                padding: 0;

            }
            .login-container {
                width: 300px;
                text-align: center;
                background-color: rgba(255, 255, 255, 0.95);
                padding: 40px 30px;
                border-radius: 12px;
                height: 400px;
    
            }
            .group-input {
                margin-bottom: 10px;
                text-align: left;
        

            
            }
            .group-input input {
                width: 100%;
                border-radius: 3px;
                border-style: solid;
                height: 40px;
                border-color: rgb(231, 226, 226);
                border-radius: 4px;
                border: 1px;
                box-shadow: 5px 5px 5px rgba(0,0,0,0.15);

            }
            .group-input label {
                font-family: Roboto,Arial;
                font-weight: bold;
            }
            button {
            width: 100%;
            background-color: rgb(30, 221, 12);
            color: white;
            border-style: none;
            border-radius: 3px;
            font-weight: bold;
            height: 40px;
            transition:background-color 0.9s;
            box-shadow: 5px 5px 5px rgba(30, 221, 12,0.15);
            transition: opacity 1s;
            cursor: pointer;

            }
            button:hover {
                opacity: 0.60;
            }
            h2 {
                color: rgb(8, 155, 20);
            }
            a {
                color: #3d7c35;
            }
            p {
                font-family: sans-serif;
            }
            a:hover {
                text-decoration: underline;
            }
            button:active {
                opacity: 0.20;
            }
        </style>
    </head>
    <body>
        <div class="login-container">
            <h2 >Uganda The Pearl of Africa <br>welcomes you</h2>
            <form>
                <div class="group-input">
                    <label for="user-name">Username</label><br>
                    <input type="text" id="Username" name="Username" placeholder="Enter your Username" required>


                </div>
                <div class="group-input">
                    <label for="password">Password</label><br>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>

                </div>
                <div >
                    <button type="submit">Login</button><br>

                </div>
                <P>Dont have an account? <a href="signup.html">Sign Up</a></P>

            </form>

        </div>
        
    </body>
</html>
