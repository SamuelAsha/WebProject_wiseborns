<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Register Form</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        background-image: url(Background2.jpg);
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
        padding:20px;
        background-repeat: no-repeat;
background-size: cover;
    }

    .container{
        width:100%;
        max-width:450px;
        background:#fff;
        border-radius:12px;
        padding:25px;
        box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    .title{
        text-align:center;
        font-size:28px;
        font-weight:bold;
        margin-bottom:25px;
    }

    .form-group{
        margin-bottom:18px;
    }

    label{
        display:block;
        margin-bottom:8px;
        font-weight:bold;
        font-size:18px;
    }

    label span{
        color:red;
    }

    input,
    select{
        width:100%;
        height:50px;
        border:1px solid #ccc;
        border-radius:8px;
        padding:0 15px;
        font-size:16px;
        outline:none;
    }

    input:focus,
    select:focus{
        border-color:green;
    }

    .hint{
        margin-top:5px;
        color:#777;
        font-size:14px;
    }

    .gender{
        display:flex;
        gap:25px;
        margin-top:10px;
        font-size:18px;
    }

    .gender label{
        display:flex;
        align-items:center;
        gap:8px;
        font-weight:normal;
    }

    .btn{
        width:100%;
        height:52px;
        border:none;
        border-radius:8px;
        background:#4CAF50;
        color:white;
        font-size:20px;
        font-weight:bold;
        cursor:pointer;
        margin-top:20px;
    }

    .btn:hover{
        background:#3e9442;
    }

    .login{
        text-align:center;
        margin-top:20px;
        font-size:16px;
    }

    .login a{
        color:#8b0000;
        text-decoration:none;
        font-weight:bold;
    }
</style>
</head>

<body>

<div class="container">

    <div class="title">
        REGISTER TO CREATE YOUR ACCOUNT
    </div>

    <form>

        <div class="form-group">
            <label><span>*</span> Surname</label>
            <input type="text" placeholder="Enter surname">
        </div>

        <div class="form-group">
            <label><span>*</span> Other Names</label>
            <input type="text" placeholder="Enter other names">
        </div>

        <div class="form-group">
            <label><span>*</span> Email Address</label>
            <input type="email" placeholder="Enter email">
            <div class="hint">
                An Email address you have access to
            </div>
        </div>

        <div class="form-group">
            <label><span>*</span> Phone</label>
            <input type="tel" placeholder="256772...">
            <div class="hint">
                Include country code (E.G 256772...)
            </div>
        </div>

        <div class="form-group">
            <label><span>*</span> Nationality</label>
            <select>
                <option>Select option</option>
                <option>Ugandan</option>
                <option>Kenyan</option>
                <option>Tanzanian</option>
                <option>Rwandan</option>
            </select>
        </div>

        <div class="form-group">
            <label><span>*</span> Date Of Birth</label>
            <input type="date">
        </div>

        <div class="form-group">
            <label><span>*</span> Sex</label>

            <div class="gender">
                <label>
                    <input type="radio" name="gender"> MALE
                </label>

                <label>
                    <input type="radio" name="gender"> FEMALE
                </label>
            </div>
        </div>

        <button class="btn" type="submit">
            REGISTER
        </button>

    </form>

    <div class="login">
        Already Registered?
        <a href="longin.html">Log in Here</a>
    </div>

</div>

</body>
</html>
